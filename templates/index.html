<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaskGuard AI | Professional Safety Monitoring</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #38bdf8;
            --primary-glow: rgba(56, 189, 248, 0.3);
            --success: #10b981;
            --danger: #f43f5e;
            --bg: #0f172a;
            --card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            padding: 3rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .header-badge {
            background: var(--primary-glow);
            color: var(--primary);
            padding: 6px 16px;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 1rem;
        }

        h1 { font-size: 2.5rem; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .subtitle { color: var(--text-muted); margin-top: 0.5rem; margin-bottom: 2.5rem; font-size: 1.1rem; }

        /* Dashboard Styles */
        .dashboard-label {
            text-align: left;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 2.5rem;
        }

        .stat-box {
            padding: 18px;
            border-radius: 16px;
            text-align: left;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }

        .stat-box:hover { background: rgba(15, 23, 42, 0.6); }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }
        .stat-value { font-size: 1.5rem; font-weight: 800; display: block; margin-top: 4px; }
        
        .box-total { border-bottom: 3px solid var(--primary); }
        .box-mask { border-bottom: 3px solid var(--success); }
        .box-nomask { border-bottom: 3px solid var(--danger); }

        hr { border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin-bottom: 2.5rem; }

        /* Upload Section */
        .upload-card {
            background: rgba(15, 23, 42, 0.5);
            border: 2px dashed rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 20px;
            transition: all 0.4s;
        }

        .upload-card:hover { border-color: var(--primary); background: rgba(56, 189, 248, 0.04); }

        input[type="file"] { margin-bottom: 1.5rem; color: var(--text-muted); }

        button {
            background: var(--primary);
            color: #0f172a;
            border: none;
            padding: 16px 40px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 15px -3px var(--primary-glow);
        }

        button:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* Results Section */
        .result-img {
            margin-top: 2rem;
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .current-scan-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 1.5rem;
        }

        .current-stat {
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
        }

        .current-mask { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .current-nomask { background: rgba(244, 63, 94, 0.15); color: var(--danger); }

        .reset-link {
            display: inline-block;
            margin-top: 2rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .footer { margin-top: 4rem; color: var(--text-muted); font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-badge">AI Safety Protocol Active</div>
        <h1>MaskGuard AI</h1>
        

        <div class="dashboard-label">System-Wide Analytics</div>
        <div class="stats-grid">
            <div class="stat-box box-total">
                <span class="stat-label">Total Scans</span>
                <span class="stat-value" style="color: var(--primary);">{{ stats.total_scans }}</span>
            </div>
            <div class="stat-box box-mask">
                <span class="stat-label">Total Compliant</span>
                <span class="stat-value" style="color: var(--success);">{{ stats.total_mask }}</span>
            </div>
            <div class="stat-box box-nomask">
                <span class="stat-label">Total Violations</span>
                <span class="stat-value" style="color: var(--danger);">{{ stats.total_no_mask }}</span>
            </div>
        </div>

        <hr>

        <div class="upload-card">
            <form action="/predict" method="post" enctype="multipart/form-data">
                <input type="file" name="image" accept="image/*" required>
                <br>
                <button type="submit">Run Safety Scan</button>
            </form>
        </div>

        {% if image %}
        <div id="results">
            <img src="{{ url_for('static', filename=image) }}?v={{ v }}" class="result-img" alt="Result">
            
            <div class="current-scan-grid">
                <div class="current-stat current-mask">
                    Compliant in Scan: {{ mask }}
                </div>
                <div class="current-stat current-nomask" style="border: 1px solid var(--danger);">
                    Violations in Scan: {{ no_mask }}
                </div>
            </div>

            <a href="/" class="reset-link">← Reset and Scan New Image</a>
        </div>
        {% endif %}
    </div>

    
</body>
</html>
